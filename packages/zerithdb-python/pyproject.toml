[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "zerithdb"
version = "0.1.0"
authors = [
  { name="ZerithDB Team" },
]
description = "Python SDK for ZerithDB - Headless AI agent node for P2P mesh network."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "aiortc>=1.5.0",
    "websockets>=11.0",
]

[project.urls]
"Homepage" = "https://github.com/arpittkhandelwal/ZerithDB"
