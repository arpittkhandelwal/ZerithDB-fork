version: 2

updates:
  # ── npm / pnpm (monorepo root + all packages) ─────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      turbo-and-build:
        patterns: ["turbo", "typescript", "prettier", "eslint*", "@typescript-eslint*"]
      testing:
        patterns: ["vitest*", "@vitest*", "playwright*"]
      changesets:
        patterns: ["@changesets/*"]

  # ── Python SDK ────────────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /packages/zerithdb-python
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
