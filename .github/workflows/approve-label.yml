name: Approve Label Trigger

on:
  pull_request_review:
    types: [submitted]

jobs:
  check-review:
    # Only run for trusted reviewers (Maintainers)
    if: |
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Save review info
        run: |
          echo "${{ github.event.pull_request.number }}" > pr_number.txt
          echo "${{ github.event.review.state }}" > review_state.txt

      - name: Upload review info
        uses: actions/upload-artifact@v4
        with:
          name: review-info
          path: |
            pr_number.txt
            review_state.txt
          retention-days: 1
