name: Security Audit

on:
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  # ── npm vulnerability scan ────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high/critical)
        run: pnpm audit --audit-level=high

  # ── Python vulnerability scan ─────────────────────────────────────────────
  python-audit:
    name: Python Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit zerithdb-python dependencies
        working-directory: packages/zerithdb-python
        run: pip-audit -r <(pip show zerithdb 2>/dev/null || echo "") --desc on || \
             pip-audit --requirement <(grep -v '^\[' pyproject.toml | grep '=') || \
             pip-audit -e .

  # ── Dependency review (on PRs that touch lock files) ─────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
