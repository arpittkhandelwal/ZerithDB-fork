name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Format ──────────────────────────────────────────────────────
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint via Turbo)
        run: pnpm turbo lint

      - name: Format check (Prettier)
        run: pnpm format:check

  # ── 2. TypeScript type-check ──────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck (tsc via Turbo)
        run: pnpm turbo typecheck

  # ── 3. Build & Unit Tests (with Turbo cache) ─────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (Turbo)
        run: pnpm turbo build

      - name: Run unit tests (Vitest)
        run: pnpm turbo test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/**"
          retention-days: 7

      - name: Bundle size check
        run: node scripts/check-bundle-size.mjs

  # ── 4. Python SDK ─────────────────────────────────────────────────────────
  python-sdk:
    name: Python SDK (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/zerithdb-python
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (ffmpeg for aiortc/av)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg libavcodec-dev libavformat-dev libavdevice-dev libavutil-dev libswscale-dev libswresample-dev libavfilter-dev pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install SDK with dev extras
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports --no-strict-optional --allow-untyped-defs --allow-untyped-calls

      - name: Test (pytest)
        run: pytest --tb=short -q
