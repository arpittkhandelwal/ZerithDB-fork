name: Level Labeler Trigger

on:
  pull_request:
    types: [opened, synchronized]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  check-level:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Level
        uses: actions/github-script@v7
        with:
          script: |
            let level = null;
            let targetType = context.eventName === 'issue_comment' ? (context.payload.issue.pull_request ? 'pr' : 'issue') : (context.payload.pull_request ? 'pr' : 'issue');
            let targetNumber = context.issue.number;

            if (context.eventName === 'issue_comment') {
              const body = context.payload.comment.body.trim();
              const association = context.payload.comment.author_association;
              const isTrusted = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association);

              if (body.startsWith('/addlevel ') && isTrusted) {
                const requestedLevel = body.split(' ')[1].toLowerCase();
                const validLevels = ['beginner', 'intermediate', 'advanced', 'critical'];
                if (validLevels.includes(requestedLevel)) {
                  level = `level:${requestedLevel}`;
                }
              }
            } else if (context.eventName === 'pull_request') {
              // Automatic labeling for PRs based on directories
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: targetNumber,
              });

              const paths = files.map(f => f.filename);
              
              const advancedPaths = ['packages/db/', 'packages/core/', 'packages/sync/', 'packages/network/', 'packages/storage/'];
              const intermediatePaths = ['packages/react/', 'packages/solid/', 'packages/vue/', 'packages/cli/', 'packages/auth/', 'packages/sdk/'];
              
              if (paths.some(p => advancedPaths.some(ap => p.startsWith(ap)))) {
                level = 'level:advanced';
              } else if (paths.some(p => intermediatePaths.some(ip => p.startsWith(ip)))) {
                level = 'level:intermediate';
              } else {
                level = 'level:beginner';
              }
            }

            if (level) {
              const fs = require('fs');
              fs.writeFileSync('level.txt', level);
              fs.writeFileSync('number.txt', targetNumber.toString());
            }

      - name: Upload info
        if: hashFiles('level.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: level-info
          path: |
            level.txt
            number.txt
          retention-days: 1
