name: Approve Label Handler

on:
  workflow_run:
    workflows: ["Approve Label Trigger"]
    types: [completed]

permissions:
  issues: write
  pull-requests: write

jobs:
  handle-label:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download review info
        uses: actions/download-artifact@v4
        with:
          name: review-info
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim());
            const state = fs.readFileSync('review_state.txt', 'utf8').trim();
            const labelName = 'gssoc:approved';
            const { owner, repo } = context.repo;

            console.log(`Processing PR #${prNumber} with review state: ${state}`);

            if (state === 'approved') {
              await github.rest.issues.addLabels({
                issue_number: prNumber,
                owner,
                repo,
                labels: [labelName]
              });
              console.log(`Successfully added "${labelName}" to PR #${prNumber}`);
            } else if (state === 'changes_requested') {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: prNumber,
                  owner,
                  repo,
                  name: labelName
                });
                console.log(`Successfully removed "${labelName}" from PR #${prNumber}`);
              } catch (error) {
                if (error.status === 404) {
                  console.log('Label not found, nothing to remove.');
                } else {
                  throw error;
                }
              }
            }
