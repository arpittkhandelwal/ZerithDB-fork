<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan 500 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue 500 -->
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background / Glow base -->
  <circle cx="250" cy="250" r="230" fill="url(#glow)" filter="blur(20px)" />
  <circle cx="250" cy="250" r="220" fill="#0f172a" /> <!-- Slate 900 background -->

  <!-- Network Nodes & Connecting Lines (Mesh Topology) -->
  <g stroke="#334155" stroke-width="3" stroke-dasharray="8,8">
    <!-- Top left to top right -->
    <line x1="140" y1="160" x2="360" y2="160" />
    <!-- Top right to bottom left -->
    <line x1="360" y1="160" x2="140" y2="340" />
    <!-- Bottom left to bottom right -->
    <line x1="140" y1="340" x2="360" y2="340" />
  </g>

  <!-- Solid 'Z' core representing the Database structure -->
  <path d="M 140 160 L 360 160 L 140 340 L 360 340" 
        fill="none" 
        stroke="url(#zGrad)" 
        stroke-width="36" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#blurGlow)" />

  <!-- Inner core highlight for the 'Z' -->
  <path d="M 140 160 L 360 160 L 140 340 L 360 340" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Node Dots -->
  <!-- Top Left -->
  <circle cx="140" cy="160" r="24" fill="#0f172a" stroke="url(#zGrad)" stroke-width="8" />
  <circle cx="140" cy="160" r="10" fill="#ffffff" />
  
  <!-- Top Right -->
  <circle cx="360" cy="160" r="24" fill="#0f172a" stroke="url(#zGrad)" stroke-width="8" />
  <circle cx="360" cy="160" r="10" fill="#ffffff" />
  
  <!-- Bottom Left -->
  <circle cx="140" cy="340" r="24" fill="#0f172a" stroke="url(#zGrad)" stroke-width="8" />
  <circle cx="140" cy="340" r="10" fill="#ffffff" />
  
  <!-- Bottom Right -->
  <circle cx="360" cy="340" r="24" fill="#0f172a" stroke="url(#zGrad)" stroke-width="8" />
  <circle cx="360" cy="340" r="10" fill="#ffffff" />
</svg>
